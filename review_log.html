<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Attendance Review</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 420px;
    margin: 20px auto;
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    box-sizing: border-box;
  }

  button {
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background: #0056b3;
  }

  #msg {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
    color: red;
    font-size: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  th, td {
    text-align: left;
    padding: 8px;
    border-bottom: 1px solid #ddd;
    font-size: 14px;
  }

  th {
    background: #f0f0f0;
  }

  /* Scrollable table for small screens */
  .table-container {
    max-height: 400px;
    overflow-y: auto;
  }

  @media (max-width: 480px) {
    th, td {
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h2>Attendance Review</h2>
  <input type="text" id="empNo" placeholder="Enter Employee No">
  <button onclick="reviewLogs()">Review</button>
  <div id="msg"></div>

  <div class="table-container">
    <table id="logTable" style="display:none;">
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Log Type</th>
          <th>Area</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<script>
async function reviewLogs() {
  const emp = document.getElementById('empNo').value.trim();
  const msg = document.getElementById('msg');
  const table = document.getElementById('logTable');
  const tbody = document.getElementById('logBody');

  msg.textContent = '';
  table.style.display = 'none';
  tbody.innerHTML = '';

  if(!emp){
    msg.textContent = 'Please enter Employee No';
    return;
  }

  try {
    const res = await fetch('review-logs.php?employee_no=' + encodeURIComponent(emp));
    const data = await res.json();

    if(!data.success){
      msg.textContent = data.message || 'No logs found';
      return;
    }

    if(data.logs.length === 0){
      msg.textContent = 'No logs found for this month';
      return;
    }

    // Populate table
    data.logs.forEach(log => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${log.Ref_Date}</td>
        <td>${log.Ref_Time}</td>
        <td>${log.Log_Type}</td>
        <td>${log.Area}</td>
      `;
      tbody.appendChild(tr);
    });

    table.style.display = 'table';
  } catch (err) {
    msg.textContent = 'Error fetching logs';
    console.error(err);
  }
}
</script>

</body>
</html>
